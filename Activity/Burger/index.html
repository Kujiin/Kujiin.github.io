
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Davie's Burger</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body class="blue">
	<div class="theme-switcher">
		<select class="theme-select" aria-label="Select color theme">
			<option value="blue" selected>Blue</option>
			<option value="pink">Pink</option>
			<option value="green">Green</option>
			<option value="dark">Dark</option>
		</select>
	</div>
	<nav>
		<img src="https://s3.amazonaws.com/codecademy-content/courses/web-101/unit-6/htmlcss1-img_burger-logo.svg" alt="Davie's Burger logo">
		<span>Menu</span>
		<span>Nutrition</span>
		<span>Order</span>
	</nav>

	<div class="content">
		<div class="header">
			<h1>BBQ BACON BURGER</h1>
		</div>

		<div class="body">
			<p>Smoky barbecue sauce, crisp bacon, melted cheese, 
            and a toasted bun come together in Davie's signature burger.</p>
		</div>

		<div class="button">ORDER NOW</div>

		<ul class="nutrition">
			<li><strong>Calories</strong> 670</li>
			<li><strong>Fat</strong> 36g</li>
			<li><strong>Carbs</strong> 52g</li>
			<li><strong>Protein</strong> 34g</li>
		</ul>
	</div>
	<script>
		const themeSelect = document.querySelector('.theme-select');

		themeSelect.addEventListener('change', () => {
			document.body.className = themeSelect.value;
		});
	</script>
</body>
</html>
