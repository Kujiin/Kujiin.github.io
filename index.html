<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 55%, #020617 100%);
      color: var(--text);
      line-height: 1.6;
      padding: 32px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    h1, h2 {
      margin-top: 0;
      color: #ffffff;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    p {
      color: var(--text);
      margin-top: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .section {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      border: 1px solid var(--border);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .social-link:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .facebook { background: #1877f2; }
    .instagram { background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af); }
    .email { background: #d14836; }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .badge {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      background: #1e293b;
      border: 1px solid var(--border);
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .badge:hover {
      border-color: rgba(56, 189, 248, 0.6);
    }

    .badge img {
      vertical-align: middle;
      margin-right: 6px;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 22px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .social-link {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>💫 About Me</h1>
    <p>I am currently a Bachelor of Science in Information Technology student.</p>
    <p class="subtitle">Learning something new every day!</p>

    <section class="section">
      <h2>🌐 Socials</h2>
      <div class="links">
        <a class="social-link facebook" href="https://www.facebook.com/kujinee/" target="_blank" rel="noopener noreferrer">
          Facebook
        </a>
        <a class="social-link instagram" href="https://instagram.com/kujinee" target="_blank" rel="noopener noreferrer">
          Instagram
        </a>
        <a class="social-link email" href="mailto:officiallykujin@gmail.com">
          Email
        </a>
      </div>
    </section>

    <section class="section">
      <h2>💻 Currently learning</h2>
      <div class="badges">
        <img src="https://img.shields.io/badge/java-%23ED8B00.svg?style=for-the-badge&logo=openjdk&logoColor=white" alt="Java">
        <img src="https://img.shields.io/badge/javascript-%23323330.svg?style=for-the-badge&logo=javascript&logoColor=%23F7DF1E" alt="JavaScript">
        <img src="https://img.shields.io/badge/html5-%23E34F26.svg?style=for-the-badge&logo=html5&logoColor=white" alt="HTML5">
        <img src="https://img.shields.io/badge/python-3670A0?style=for-the-badge&logo=python&logoColor=ffdd54" alt="Python">
        <img src="https://img.shields.io/badge/lua-%232C2D72.svg?style=for-the-badge&logo=lua&logoColor=white" alt="Lua">
        <img src="https://img.shields.io/badge/apache-%23D42029.svg?style=for-the-badge&logo=apache&logoColor=white" alt="Apache">
        <img src="https://img.shields.io/badge/Apache%20Ant-A81C7D?style=for-the-badge&logo=Apache%20Ant&logoColor=white" alt="Apache Ant">
        <img src="https://img.shields.io/badge/Apache%20Maven-C71A36?style=for-the-badge&logo=Apache%20Maven&logoColor=white" alt="Apache Maven">
        <img src="https://img.shields.io/badge/mysql-4479A1.svg?style=for-the-badge&logo=mysql&logoColor=white" alt="MySQL">
        <img src="https://img.shields.io/badge/adobe-%23FF0000.svg?style=for-the-badge&logo=adobe&logoColor=white" alt="Adobe">
        <img src="https://img.shields.io/badge/adobe%20illustrator-%23FF9A00.svg?style=for-the-badge&logo=adobe%20illustrator&logoColor=white" alt="Adobe Illustrator">
        <img src="https://img.shields.io/badge/Adobe%20After%20Effects-9999FF.svg?style=for-the-badge&logo=Adobe%20After%20Effects&logoColor=white" alt="Adobe After Effects">
        <img src="https://img.shields.io/badge/Adobe%20Lightroom-31A8FF.svg?style=for-the-badge&logo=Adobe%20Lightroom&logoColor=white" alt="Adobe Lightroom">
        <img src="https://img.shields.io/badge/Adobe%20Lightroom%20Classic-31A8FF.svg?style=for-the-badge&logo=Adobe%20Lightroom%20Classic&logoColor=white" alt="Adobe Lightroom Classic">
        <img src="https://img.shields.io/badge/Canva-%2300C4CC.svg?style=for-the-badge&logo=Canva&logoColor=white" alt="Canva">
        <img src="https://img.shields.io/badge/-selenium-%43B02A?style=for-the-badge&logo=selenium&logoColor=white" alt="Selenium">
      </div>
    </section>
  </main>
</body>
</html>
